<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expose The Label - Browse</title>
    <link rel="stylesheet" href="category.css" />
</head>
<body>
    <nav class="top-nav">
        <div class="nav-content">
            <a class="logo-text" href="index.html">Expose<span>TheLabel</span></a>
            <div class="search-wrapper">
                <div class="search-bar-container">
                    <input id="productSearch" type="search" placeholder="Search for biscuits, chips, sodas..." />
                    <button class="search-icon-btn">🔍 Search</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-layout">
        <aside class="sidebar">
            <h3>Filters</h3>
            <div class="filter-group">
                <h4>Health Risk</h4>
                <label><input type="checkbox" class="filter-risk" value="Low"> Low Risk</label>
                <label><input type="checkbox" class="filter-risk" value="Medium"> Medium Risk</label>
                <label><input type="checkbox" class="filter-risk" value="High"> High Risk</label>
            </div>
            <div class="filter-group">
                <h4>Dietary Needs</h4>
                <label><input type="checkbox"> Sugar-Free</label>
                <label><input type="checkbox"> Vegan</label>
                <label><input type="checkbox"> Nut-Free</label>
            </div>
        </aside>

        <main class="content-area">
            <header class="content-header">
                <div>
                    <h1 id="categoryTitle">Category</h1>
                    <p id="resultCount">Showing all items</p>
                </div>
                <div class="sort-options">
                    <select id="sortProducts">
                        <option value="default">Sort by: Featured</option>
                        <option value="risk-low">Risk: Low to High</option>
                        <option value="calories">Lowest Calories</option>
                    </select>
                </div>
            </header>

            <div id="product-container" class="product-grid">
                </div>
        </main>
    </div>

    <script src="products.js"></script>
    <script src="category.js"></script>
</body>
</html>
