<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Scan Barcode - Trust The Label</title>
  <link rel="stylesheet" href="Home.css" />
  <style>
    .scanner-container { max-width:1100px; margin:30px auto; }
    #video { width:100%; max-height:480px; background:#000; border-radius:10px }
    .controls { margin:12px 0 }
    .result-card { margin-top:14px }
    .manual { display:flex; gap:10px; align-items:center }
    .manual input { padding:10px; border-radius:8px; border:1px solid #d6eada }
  </style>
</head>
<body>
  <div class="page-container scanner-container">
    <a class="back-link" href="index.html">← Back to Home</a>
    <h1>Scan Barcode</h1>

    <p>Allow camera access and point your phone at a product barcode. Or enter a code manually.</p>

    <div>
      <video id="video" muted></video>
    </div>

    <div class="controls">
      <button id="startBtn">Start Camera</button>
      <button id="stopBtn">Stop</button>
      <span id="status" style="margin-left:12px;color:#2d7f51;font-weight:700"></span>
    </div>

    <div class="manual">
      <input id="manualCode" placeholder="Enter barcode manually" />
      <button id="lookupBtn">Lookup</button>
    </div>

    <div id="scanResult" class="result-card"></div>
  </div>

  <script src="https://unpkg.com/@zxing/library@0.18.6"></script>
  <script src="products.js"></script>
  <script src="scan.js"></script>
</body>
</html>
